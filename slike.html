<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Slike Solina</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f7f7f7; margin:0; padding:20px; text-align:center }
        h1{ margin-top:10px }
        .gallery { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; max-width:1000px; margin:20px auto }
        .card { background:white; padding:10px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); width:300px }
        .card img{ width:100%; height:200px; object-fit:cover; border-radius:6px }
        .caption{ margin-top:8px; font-size:14px; color:#333 }
        .back-button{ display:inline-block; margin:20px; padding:12px 24px; background:#e6e6e6; border:2px solid #555; border-radius:20px; text-decoration:none; color:black }
        .back-button:hover{ background:#d2d2d2 }
    </style>
</head>
<body>
    <h1>SLIKE SOLINA</h1>

    <div class="gallery">
        <div class="card">
            <img src="./images/solin1.jpg" alt="Solin 1">
            <div class="caption">Rijeka Jadro i okolina</div>
        </div>
        <div class="card">
            <img src="./images/solin2.jpg" alt="Solin 2">
            <div class="caption">Arheološka nalazišta</div>
        </div>
        <div class="card">
            <img src="./images/solin3.jpg" alt="Solin 3">
            <div class="caption">Gospin otok</div>
        </div>
        <div class="card">
            <img src="./images/solin4.jpg" alt="Solin 4">
            <div class="caption">Mlinica i krajolik</div>
        </div>
    </div>

    <a href="./Mateo.html" class="back-button">← Natrag na početnu</a>
</body>
</html>
